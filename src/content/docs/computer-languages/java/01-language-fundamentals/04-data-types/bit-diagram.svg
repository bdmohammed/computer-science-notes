<svg viewBox="0 0 540 200" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <!-- Sign bit cell -->
  <rect x="10" y="10" width="55" height="32" fill="#ffe0e0" stroke="#888" stroke-width="1.5"/>
  <text x="37" y="31" text-anchor="middle" fill="#c0392b" font-weight="bold">x</text>

  <!-- Magnitude cells -->
  <rect x="65"  y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>
  <rect x="120" y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>
  <rect x="175" y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>
  <rect x="230" y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>
  <rect x="285" y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>
  <rect x="340" y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>
  <rect x="395" y="10" width="55" height="32" fill="#e0f0ff" stroke="#888" stroke-width="1.5"/>

  <text x="92"  y="31" text-anchor="middle" fill="#1a1a2e">1</text>
  <text x="147" y="31" text-anchor="middle" fill="#1a1a2e">1</text>
  <text x="202" y="31" text-anchor="middle" fill="#1a1a2e">1</text>
  <text x="257" y="31" text-anchor="middle" fill="#1a1a2e">1</text>
  <text x="312" y="31" text-anchor="middle" fill="#1a1a2e">1</text>
  <text x="367" y="31" text-anchor="middle" fill="#1a1a2e">1</text>
  <text x="422" y="31" text-anchor="middle" fill="#1a1a2e">1</text>

  <!-- Sign bit arrow down -->
  <line x1="37" y1="42" x2="37" y2="72" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Magnitude bracket -->
  <line x1="65"  y1="42" x2="65"  y2="52" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="450" y1="42" x2="450" y2="52" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="65"  y1="52" x2="450" y2="52" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="257" y1="52" x2="257" y2="72" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2980b9"/>
    </marker>
  </defs>

  <!-- Sign bit label -->
  <text x="37" y="88"  text-anchor="middle" fill="#c0392b" font-weight="bold">Sign bit</text>
  <text x="37" y="106" text-anchor="middle" fill="#c0392b" font-size="12">0 → (+ve)</text>
  <text x="37" y="122" text-anchor="middle" fill="#c0392b" font-size="12">1 → (−ve)</text>

  <!-- Magnitude label -->
  <text x="257" y="88"  text-anchor="middle" fill="#2980b9" font-weight="bold">Magnitude (7 bits)</text>
  <text x="257" y="106" text-anchor="middle" fill="#2980b9" font-size="12">(2⁶)+(2⁵)+(2⁴)+(2³)+(2²)+(2¹)+(2⁰)</text>
  <text x="257" y="122" text-anchor="middle" fill="#2980b9" font-size="12">64 + 32 + 16 + 8 + 4 + 2 + 1</text>

  <!-- Result -->
  <text x="257" y="150" text-anchor="middle" fill="#27ae60" font-size="14" font-weight="bold">= +127 (max positive)</text>

  <!-- Bit index labels -->
  <text x="92"  y="8" text-anchor="middle" fill="#888" font-size="10">b₆</text>
  <text x="147" y="8" text-anchor="middle" fill="#888" font-size="10">b₅</text>
  <text x="202" y="8" text-anchor="middle" fill="#888" font-size="10">b₄</text>
  <text x="257" y="8" text-anchor="middle" fill="#888" font-size="10">b₃</text>
  <text x="312" y="8" text-anchor="middle" fill="#888" font-size="10">b₂</text>
  <text x="367" y="8" text-anchor="middle" fill="#888" font-size="10">b₁</text>
  <text x="422" y="8" text-anchor="middle" fill="#888" font-size="10">b₀</text>

</svg>